name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: ruff
        run: ruff check .

      - name: pylint
        run: pylint src --fail-under=10

      - name: mypy
        run: mypy .

  unit:
    name: Unit / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -q

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: quiz_db_test
          POSTGRES_USER: quiz_user
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U quiz_user -d quiz_db_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://quiz_user:secret@localhost:5432/quiz_db_test
      APP_SECRET_KEY: ci-secret-key
      DEBUG: "false"
      PASS_THRESHOLD: "60"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Apply migrations (PostgreSQL)
        run: alembic upgrade head

      - name: Run all tests with coverage (≥80%)
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  migrations:
    name: Migrations smoke (up → down → up)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: quiz_db_migrate
          POSTGRES_USER: quiz_user
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U quiz_user -d quiz_db_migrate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://quiz_user:secret@localhost:5432/quiz_db_migrate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Migrate up
        run: alembic upgrade head

      - name: Migrate down to base
        run: alembic downgrade base

      - name: Migrate up again
        run: alembic upgrade head

  smoke:
    name: App smoke-import
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: Import src.main without connecting to the DB
        env:
          DATABASE_URL: "sqlite:///:memory:"
          APP_SECRET_KEY: smoke
        run: python -c "from src.main import create_app; create_app()"
