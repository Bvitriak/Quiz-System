<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password recovery — Quiz System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="page page--center">
    <section class="card card--compact">
        <header class="card__header">
            <h1 class="card__title card__title--center">Forgot password?</h1>
        </header>

        <p>
            Self-service password recovery is not available yet. Please contact
            the system administrator — they can reset your password manually.
        </p>
        <p>
            <strong>Administrator contact:</strong>
            <a href="mailto:{{ admin_contact }}">{{ admin_contact }}</a>
        </p>

        <div class="form__footer">
            <a href="{{ url_for('auth.login') }}">← Back to sign in</a>
        </div>
    </section>
</body>
</html>
